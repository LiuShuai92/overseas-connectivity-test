name: 🌐 海外连通性测试

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: '目标URL'
        required: true
        default: 'https://test-api.fanjiao.co/walkman/api/pay/google/rtdn'
      method:
        description: 'HTTP方法'
        required: false
        default: 'POST'
      content_type:
        description: 'Content-Type'
        required: false
        default: 'application/json'
      body:
        description: '请求体 (JSON)'
        required: false
        default: '{"message":{"data":"","messageId":"test-001","publishTime":"2026-05-19T00:00:00.000Z"},"subscription":"projects/test/subscriptions/test"}'

jobs:
  connectivity-test:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 发送请求
        run: |
          SOURCE_IP=$(curl -s --connect-timeout 10 ifconfig.me)
          echo "## 🌍 测试结果" >> $GITHUB_STEP_SUMMARY
          echo "**来源IP**: \`$SOURCE_IP\`" >> $GITHUB_STEP_SUMMARY
          echo "**目标**: \`${{ inputs.target_url }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**方法**: \`${{ inputs.method }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" \
            --connect-timeout 15 \
            --max-time 30 \
            -X "${{ inputs.method }}" \
            -H "Content-Type: ${{ inputs.content_type }}" \
            -d '${{ inputs.body }}' \
            "${{ inputs.target_url }}" 2>/dev/null)
          
          echo "**状态码**: \`$HTTP_CODE\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**响应体**:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat response.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(空)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "状态码: $HTTP_CODE"
          echo "来源IP: $SOURCE_IP"
          cat response.txt 2>/dev/null
