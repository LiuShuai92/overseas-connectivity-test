name: 🌐 海外连通性测试

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: '目标URL'
        required: true
        default: 'https://test-api.fanjiao.co/walkman/api/pay/google/rtdn'
      method:
        description: 'HTTP方法'
        required: false
        default: 'POST'
      content_type:
        description: 'Content-Type'
        required: false
        default: 'application/json'
      body:
        description: '请求体 (JSON)'
        required: false
        default: '{"message":{"data":"","messageId":"test-001","publishTime":"2026-05-19T00:00:00.000Z"},"subscription":"projects/test/subscriptions/test"}'

jobs:
  connectivity-test:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 发送请求
        run: |
          SOURCE_IP=$(curl -s --connect-timeout 10 ifconfig.me)
          echo "## 🌍 测试结果" >> $GITHUB_STEP_SUMMARY
          echo "**来源IP**: \`$SOURCE_IP\`" >> $GITHUB_STEP_SUMMARY
          echo "**目标**: \`${{ inputs.target_url }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**方法**: \`${{ inputs.method }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 使用 -v 参数记录详细通信过程，将 stderr 导入 verbose.txt
          HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" -v \
            --connect-timeout 15 \
            --max-time 30 \
            -X "${{ inputs.method }}" \
            -H "Content-Type: ${{ inputs.content_type }}" \
            -d '${{ inputs.body }}' \
            "${{ inputs.target_url }}" 2> verbose.txt)
          
          echo "**状态码**: \`$HTTP_CODE\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 从 verbose 日志中提取 请求头（以 "> " 开头）
          echo "**请求头 (Request Headers)**:" >> $GITHUB_STEP_SUMMARY
          echo '```http' >> $GITHUB_STEP_SUMMARY
          grep "^> " verbose.txt | sed 's/^> //' >> $GITHUB_STEP_SUMMARY || echo "(无)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 从 verbose 日志中提取 响应头（以 "< " 开头）
          echo "**响应头 (Response Headers)**:" >> $GITHUB_STEP_SUMMARY
          echo '```http' >> $GITHUB_STEP_SUMMARY
          grep "^< " verbose.txt | sed 's/^< //' >> $GITHUB_STEP_SUMMARY || echo "(无)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "**响应体 (Response Body)**:" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat response.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(空)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          # --- GitHub Actions 控制台实时输出 ---
          echo "状态码: $HTTP_CODE"
          echo "来源IP: $SOURCE_IP"
          echo -e "\n--- 请求头 (Request Headers) ---"
          grep "^> " verbose.txt | sed 's/^> //'
          echo -e "\n--- 响应头 (Response Headers) ---"
          grep "^< " verbose.txt | sed 's/^< //'
          echo -e "\n--- 响应体 (Response Body) ---"
          cat response.txt 2>/dev/null
          echo ""
